<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f4f8;
      padding: 30px 15px;
    }

    .app {
      max-width: 420px;
      margin: auto;
      background: white;
      padding: 24px;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }

    h1 {
      text-align: center;
    }

    .input-box {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 16px;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      font-size: 16px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      background: #f7f7f7;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    li.done span {
      text-decoration: line-through;
      color: gray;
    }

    .delete-btn {
      background: #e74c3c;
      padding: 6px 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="app">
    <h1>Việc Trinh Mèo cần làm</h1>

    <div class="input-box">
      <input type="text" id="taskInput" placeholder="Nhập công việc...">
      <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

    function saveTasks() {
      localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function renderTasks() {
      const taskList = document.getElementById("taskList");
      taskList.innerHTML = "";

      tasks.forEach((task, index) => {
        const li = document.createElement("li");

        if (task.done) {
          li.classList.add("done");
        }

        li.innerHTML = `
          <span onclick="toggleTask(${index})">${task.text}</span>
          <button class="delete-btn" onclick="deleteTask(${index})">Xóa</button>
        `;

        taskList.appendChild(li);
      });
    }

    function addTask() {
      const input = document.getElementById("taskInput");
      const text = input.value.trim();

      if (text === "") {
        alert("Nhập công việc trước đã!");
        return;
      }

      tasks.push({
        text: text,
        done: false
      });

      input.value = "";
      saveTasks();
      renderTasks();
    }

    function toggleTask(index) {
      tasks[index].done = !tasks[index].done;
      saveTasks();
      renderTasks();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      saveTasks();
      renderTasks();
    }

    renderTasks();
  </script>

</body>
</html>
